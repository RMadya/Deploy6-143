<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARA - Input Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            margin: 0; 
            padding: 30px 20px; 
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container { 
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px; 
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h4 { 
            font-size: 24px; 
            font-weight: 700; 
            color: #fff; 
            margin-top: 0; 
            margin-bottom: 25px; 
            text-align: left;
            letter-spacing: 0.5px;
        }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-size: 14px; 
            color: #cbd5e1; 
            margin-bottom: 8px; 
            font-weight: 500;
        }
        input[type="text"] { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px;
            box-sizing: border-box; 
            background-color: rgba(15, 23, 42, 0.6);
            color: #fff;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
        }
        input[type="text"]:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
            outline: none;
        }
        .radio-vertical-group { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }
        .radio-container {
            display: flex;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }
        .radio-container:hover {
            border-color: rgba(139, 92, 246, 0.5);
        }
        .radio-container label {
            margin-bottom: 0;
            flex-grow: 1;
            font-size: 14px;
            cursor: pointer;
            color: #e2e8f0;
        }
        .radio-container input[type="radio"] {
            accent-color: #8b5cf6;
            transform: scale(1.2);
        }
        
        button { 
            width: 100%;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff; 
            border: none; 
            padding: 14px 16px; 
            font-size: 15px; 
            font-weight: 600;
            border-radius: 12px; 
            cursor: pointer; 
            margin-top: 15px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.6);
        }
        
        a.back-link { 
            display: block;
            text-align: center;
            color: #cbd5e1; 
            text-decoration: none; 
            font-size: 14px; 
            transition: color 0.3s ease;
        }
        a.back-link:hover { 
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h4>Register New Data</h4>
        <form id="mhsForm">
            <div class="form-group">
                <label>Nama Mahasiswa</label>
                <input type="text" id="nama" placeholder="Full name" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Nomor Induk Mahasiswa (NIM)</label>
                <input type="text" id="nim" placeholder="Unique ID" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Jenis Kelamin</label>
                <div class="radio-vertical-group">
                    <label class="radio-container">
                        <label>Laki-laki</label>
                        <input type="radio" name="jk" value="Laki-laki" required>
                    </label>
                    <label class="radio-container">
                        <label>Perempuan</label>
                        <input type="radio" name="jk" value="Perempuan" required>
                    </label>
                </div>
            </div>
            <button type="submit">Submit Record</button>
            <a href="home.html" class="back-link">Return to Dashboard</a>
        </form>
    </div>

    <script>
        if(sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        document.getElementById('mhsForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nama = document.getElementById('nama').value;
            const nim = document.getElementById('nim').value;
            const jk = document.querySelector('input[name="jk"]:checked').value;

            let mhsData = [];
            try {
                mhsData = JSON.parse(sessionStorage.getItem('mhsData')) || [];
            } catch(e) {}

            mhsData.push({ nama, nim, jk });
            sessionStorage.setItem('mhsData', JSON.stringify(mhsData));

            window.location.href = 'home.html';
        });
    </script>
</body>
</html>
